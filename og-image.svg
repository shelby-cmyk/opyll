<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#FBE9D7"/>
      <stop offset="100%" stop-color="#EFEAF5"/>
    </linearGradient>
    <radialGradient id="opalHi" cx="32%" cy="26%" r="22%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="peach" cx="68%" cy="32%" r="42%">
      <stop offset="0%" stop-color="#FBE4D2"/>
      <stop offset="100%" stop-color="#FBE4D2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="violet" cx="28%" cy="72%" r="50%">
      <stop offset="0%" stop-color="#B4A3D1" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#B4A3D1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mint" cx="78%" cy="72%" r="42%">
      <stop offset="0%" stop-color="#A8C4B4" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#A8C4B4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="opalBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBE9D7"/>
      <stop offset="50%" stop-color="#EFEAF5"/>
      <stop offset="100%" stop-color="#E4EDE7"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <g transform="translate(880, 315)">
    <circle r="200" fill="url(#opalBase)"/>
    <circle r="200" fill="url(#peach)"/>
    <circle r="200" fill="url(#violet)"/>
    <circle r="200" fill="url(#mint)"/>
    <circle r="200" fill="url(#opalHi)"/>
    <circle r="200" fill="none" stroke="#C49A6C" stroke-opacity="0.22" stroke-width="1"/>
  </g>

  <text x="80" y="200" font-family="Inter, sans-serif" font-size="14" font-weight="600" letter-spacing="3" fill="#5C6068" text-transform="uppercase">BUILT FOR MAINTENANCE</text>

  <text x="80" y="320" font-family="Inter, sans-serif" font-size="88" font-weight="700" letter-spacing="-3" fill="#15171C">Lose the weight.</text>
  <text x="80" y="420" font-family="Fraunces, Georgia, serif" font-style="italic" font-size="88" font-weight="500" letter-spacing="-3" fill="#E89D6F">Hold it for life.</text>

  <text x="80" y="500" font-family="Inter, sans-serif" font-size="22" font-weight="500" fill="#5C6068">A physician-led GLP-1 program built to last.</text>

  <g transform="translate(80, 555)">
    <text font-family="Fraunces, Georgia, serif" font-size="36" font-weight="500" fill="#15171C" letter-spacing="-1">Opyll</text>
    <circle cx="98" cy="-6" r="6" fill="url(#opalBase)" stroke="#C49A6C" stroke-opacity="0.3" stroke-width="0.5"/>
    <circle cx="98" cy="-6" r="6" fill="url(#peach)"/>
    <circle cx="98" cy="-6" r="6" fill="url(#violet)"/>
    <circle cx="98" cy="-6" r="6" fill="url(#opalHi)"/>
  </g>
</svg>
